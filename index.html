<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="header">Caso1</title>
    <link rel="stylesheet" href="stylesheet.css">

</head>

<body>
    <h1 id="titulo">Caso 1 Jenny Liang</h1>
    <div>
        <h2 id="Subtitulo">Agrega estudiantes:</h2>
        <form id="formulario">
            <label>Nombre:</label>
            <input type="text" id="nombre">

            <label>Apellidos:</label>
            <input type="text" id="apellido">

            <label>Nota:</label>
            <input type="number" id="nota" min="0" max="100">

            <p id="mensaje"></p>

            <button id="btn" type="submit">
                Agregar
            </button>
        </form>

        <div>
            <h2 id="Subtitulo">Tabla de estudiantes:</h2>

            <table id="tabla">
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Apellido</th>
                        <th>Nota</th>
                    </tr>
                </thead>
                <tbody id="tablaEstudiantes">

                    <tr>
                        <td>Maria</td>
                        <td>Mora Perez</td>
                        <td>90</td>
                    </tr>

                    <tr>
                        <td>Pedro</td>
                        <td>Sibaja Lopez</td>
                        <td>60</td>
                    </tr>

                    <tr>
                        <td>Marco</td>
                        <td>Rojas Castro</td>
                        <td>78</td>
                    </tr>

                </tbody>
            </table>

            <h2 id="Subtitulo">Resumen de estudiantes</h2>
            <div id="resumen">
                <p id="mayorNota"></p>
                <p id="promedio"></p>
                <p id="menorNota"></p>
            </div>

</body>
<script src="script.js"></script>

</html>
